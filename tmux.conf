# remap main prefix key to ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# enable vi-like keybindings for scrollbuffer mode
set -g mode-keys vi

# let `y` yank selected text to the clipboard (`v` lets you select)
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# disable sound bell
set -g bell-action none

# disable visual bell
set -g visual-bell off

# highlight current tab in the status line
set-window-option -g window-status-current-style fg=#ffffff

# Switch to a session by typing its name
bind e command-prompt -I '' "switch -t %%"
